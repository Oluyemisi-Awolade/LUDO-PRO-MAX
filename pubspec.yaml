name: ludo_pro_max
description: Ludo Pro Max — professional multiplayer Ludo game
version: 2.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0

  # Audio
  audioplayers: ^5.2.1

  # Persistence
  shared_preferences: ^2.2.2

  # Utils
  url_launcher: ^6.2.2
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
