name: Build Ludo Pro Max APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "flet==0.84.0" aiohttp

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter 3.41.4
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.4"
          channel: stable
          cache: true

      - name: Install Android SDK command-line tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y wget unzip
          SDK_DIR="$HOME/android-sdk"
          mkdir -p "$SDK_DIR/cmdline-tools"
          wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
               -O /tmp/cmdtools.zip
          unzip -q /tmp/cmdtools.zip -d /tmp/cmdtools_extract
          mv /tmp/cmdtools_extract/cmdline-tools "$SDK_DIR/cmdline-tools/latest"
          echo "ANDROID_HOME=$SDK_DIR"             >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$SDK_DIR"         >> $GITHUB_ENV
          echo "$SDK_DIR/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$SDK_DIR/platform-tools"           >> $GITHUB_PATH

      - name: Accept Android licenses and install build tools
        run: |
          yes | sdkmanager --licenses
          sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Disable Flutter analytics and accept Flutter licenses
        run: |
          flutter config --no-analytics
          yes | flutter doctor --android-licenses || true

      - name: Build APK
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_DB_URL:  ${{ secrets.FIREBASE_DB_URL }}
        run: |
          flet build apk \
            --project "LudoProMax" \
            --product "Ludo Pro Max" \
            --org "com.ludopromax" \
            --build-version "2.0.0" \
            --build-number ${{ github.run_number }}

      - name: Find APK
        run: find . -name "*.apk" 2>/dev/null || echo "No APK found"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ludo-pro-max-apk
          path: "**/*.apk"
          if-no-files-found: warn
          retention-days: 30
